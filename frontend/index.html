<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Emblem — the assistant you talk to</title>
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#14151b" />
    <script>
      // Resolve the theme BEFORE CSS paints — no flash of the wrong mode.
      // Ink (dark) is the default; "system" only applies if the user chose it.
      (function () {
        try {
          var pref = localStorage.getItem("emblem_theme") || "dark";
          var dark = pref === "dark" ||
            (pref === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.content = dark ? "#14151b" : "#f6f1e7";
        } catch (e) { document.documentElement.dataset.theme = "dark"; }
      })();
    </script>
    <meta name="description" content="Emblem is the workspace you talk to. It connects to your tools, remembers what matters, and quietly gets things done." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Emblem" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preload" href="/fonts/instrument-sans.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/fonts/newsreader-italic.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
      }
    </script>
  </body>
</html>
