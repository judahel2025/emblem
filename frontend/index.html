<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>Emblem — the assistant you talk to</title>
    <link rel="icon" href="/icon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#ffffff" />
    <script>
      // Resolve the theme BEFORE CSS paints — no flash of the wrong mode.
      (function () {
        try {
          var pref = localStorage.getItem("emblem_theme") || "system";
          var dark = pref === "dark" ||
            (pref === "system" && matchMedia("(prefers-color-scheme: dark)").matches);
          document.documentElement.dataset.theme = dark ? "dark" : "light";
          var m = document.querySelector('meta[name="theme-color"]');
          if (m) m.content = dark ? "#0b0b0d" : "#ffffff";
        } catch (e) { document.documentElement.dataset.theme = "light"; }
      })();
    </script>
    <meta name="description" content="Emblem is the workspace you talk to. It connects to your tools, remembers what matters, and quietly gets things done." />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Emblem" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => navigator.serviceWorker.register("/sw.js").catch(() => {}));
      }
    </script>
  </body>
</html>
